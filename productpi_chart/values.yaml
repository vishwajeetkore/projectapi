replicaCount: 4

image:
  repository: 531262218012.dkr.ecr.us-east-1.amazonaws.com/mavenwebapp
  tag: latest
  pullPolicy: Always

container:
  name: mavencontainer
  port: 8080

service:
  name: mavenwebapp-service
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "150m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

labels:
  app: mavenwebapp

# ✅ ADD THIS BLOCK
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  paths:
    - path: /
      pathType: Prefix

hpa:
 enabled: true
 minReplicas: 2
 maxReplicas: 12
 cpuUtilization: 50
