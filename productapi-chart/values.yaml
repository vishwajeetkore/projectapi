replicaCount: 2

image:
  repository: 907260787494.dkr.ecr.us-east-1.amazonaws.com/backend_product
  tag: latest
  pullPolicy: Always

container:
  name: products
  port: 8080

service:
  name: productssvc
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "150m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

labels:
  app: products

# ✅ ADD THIS BLOCK
ingress:
  enabled: true
  className: nginx
  paths:
    - path: /api
      pathType: Prefix

hpa:
 enabled: true
 minReplicas: 2
 maxReplicas: 5
 cpuUtilization: 50
